<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/styles.css?v=2" />
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <i class="ph-fill ph-trend-up logo-icon"></i>
          <h1>Tracker</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="stat-pill">
          <span class="stat-label">Tổng</span>
          <strong id="summary-total">0</strong>
        </div>
        <div class="stat-pill success">
          <span class="stat-label">Thành công</span>
          <strong id="summary-success">0</strong>
        </div>
        <div class="stat-pill error">
          <span class="stat-label">Thất bại</span>
          <strong id="summary-failed">0</strong>
        </div>
      </div>
    </header>

    <main class="main-layout">
      
      <div class="left-col">
        <section class="section">
          <div class="section-header">
            <h2>Quét sản phẩm</h2>
          </div>
          <form id="scan-form" class="clean-form">
            <div class="input-group">
              <i class="ph ph-link input-icon"></i>
              <textarea id="url-input" rows="4"
                placeholder="Nhập danh sách URL sản phẩm..."></textarea>
            </div>
            <div class="action-row">
              <button id="scan-button" type="submit" class="btn btn-primary">Bắt đầu quét</button>
              <button id="sample-button" class="btn btn-text" type="button">URL mẫu</button>
            </div>
          </form>
        </section>

        <section class="section">
          <div class="section-header">
            <h2>Lịch sử giá</h2>
          </div>
          <div id="chart-empty" class="chart-empty">
            <i class="ph ph-chart-line-up"></i>
            <span>Chọn một sản phẩm để xem biểu đồ</span>
          </div>
          <div id="chart-shell" class="chart-shell hidden">
            <div class="chart-header">
              <div>
                <h3 id="chart-title" class="chart-title"></h3>
                <a id="chart-subtitle" class="chart-subtitle" target="_blank"></a>
              </div>
              <div id="chart-range" class="chart-range"></div>
            </div>
            <div class="canvas-wrap">
              <canvas id="history-chart-canvas"></canvas>
            </div>
          </div>
        </section>
      </div>

      <div class="right-col">
        <section class="section">
          <div class="section-header">
            <h2>Mục tiêu giá</h2>
          </div>
          <div id="watchlist" class="watchlist"></div>
        </section>
      </div>

    </main>

    <section class="section full-width">
      <div class="section-header">
        <h2>Kết quả</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Giá hiện tại</th>
              <th>Đánh giá</th>
              <th>Mục tiêu</th>
              <th style="white-space: nowrap;">AI Phân tích</th>
              <th style="width: 120px; text-align: right;">Hành động</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- Nút FAB AI -->
  <button id="ai-fab" class="ai-fab" title="Trợ lý AI">
    <i class="ph-fill ph-robot"></i>
  </button>

  <!-- Lớp phủ mờ -->
  <div id="ai-sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- Sidebar Chatbot -->
  <div id="ai-sidebar" class="ai-sidebar hidden">
    <div class="ai-sidebar-header">
      <div class="ai-sidebar-title">
        <i class="ph-fill ph-robot"></i> <span>Chuyên gia Tài chính</span>
      </div>
      <button id="ai-sidebar-close" class="btn btn-text" style="padding: 4px; border: 1px solid var(--primary); color: var(--primary); border-radius: 4px;" title="Đóng">
        <i class="ph ph-caret-right" style="font-size: 1.25rem;"></i>
      </button>
    </div>
    
    <div id="ai-chat-body" class="ai-sidebar-body">
      <div class="chat-empty-state">
        <i class="ph-fill ph-robot"></i>
        <p>Xin chào! Tôi có thể giúp bạn phân tích giá của sản phẩm nào?</p>
      </div>
    </div>

    <div class="ai-sidebar-footer">
      <form id="ai-chat-form" class="ai-chat-form">
        <input type="text" id="ai-chat-input" placeholder="Hỏi AI về sản phẩm..." autocomplete="off" disabled />
        <button type="submit" id="ai-chat-submit" class="btn btn-primary" style="padding: 10px;" title="Gửi" disabled>
          <i class="ph-fill ph-paper-plane-right"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="/app.js?v=5"></script>
</body>

</html>
